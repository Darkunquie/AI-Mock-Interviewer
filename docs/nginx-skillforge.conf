# Production nginx for ai-mock-interview (Hostinger VPS).
# Reverse-proxies https://<domain> -> the Next.js app on 127.0.0.1:3000 (pm2).
#
# Install (order matters — the HTTPS block below references cert files that do
# NOT exist on a fresh VPS, so enabling this config first makes `nginx -t` fail,
# and `certbot --nginx` can't reload a broken config. Bootstrap HTTP-only, issue
# the cert, THEN enable this full config):
#
#   # 1. Bootstrap: serve HTTP only, just enough to answer the ACME challenge.
#   sudo mkdir -p /var/www/certbot
#   sudo tee /etc/nginx/sites-available/skillforge-bootstrap >/dev/null <<'EOF'
#   server {
#       listen 80;
#       listen [::]:80;
#       server_name <domain> www.<domain>;
#       location /.well-known/acme-challenge/ { root /var/www/certbot; }
#   }
#   EOF
#   sudo ln -s /etc/nginx/sites-available/skillforge-bootstrap /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # 2. Issue the cert over the webroot (does not touch nginx config).
#   sudo certbot certonly --webroot -w /var/www/certbot -d <domain> -d www.<domain>
#
#   # 3. Cert now exists — swap in this full TLS config and reload.
#   sudo rm /etc/nginx/sites-enabled/skillforge-bootstrap
#   sudo cp docs/nginx-skillforge.conf /etc/nginx/sites-available/skillforge
#   sudo ln -s /etc/nginx/sites-available/skillforge /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # Renewals: certbot's systemd timer renews automatically; this config keeps
#   # the ACME-challenge location on :80 so --webroot renewals keep working.
#
# Replace <domain> below. Set TRUSTED_PROXY_HOPS=1 in the app env so the app
# trusts the X-Real-IP / X-Forwarded-For this config stamps (kills IP spoofing
# of rate limits — Phase 0 P0.2).

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name <domain> www.<domain>;

    # Let certbot answer ACME challenges over HTTP.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Redirect to the canonical $server_name (first name above), NOT $host — a
    # spoofed/unknown Host must not be reflected into an attacker-controlled
    # redirect target if this ever becomes the default server.
    location / { return 301 https://$server_name$request_uri; }
}

# --- HTTPS: the app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <domain> www.<domain>;

    # TLS (certbot manages these paths). They exist only AFTER the bootstrap +
    # `certbot certonly` step above — do not enable this server block before then
    # or `nginx -t` fails with "no such file".
    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — force HTTPS for 2 years (app also sends security headers itself).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Real client IP. nginx is the direct peer, so $remote_addr is the true
    # client. X-Real-IP is OVERRIDDEN here (client-sent values can't stick),
    # and X-Forwarded-For appends our observed peer. The app reads these with
    # TRUSTED_PROXY_HOPS=1.
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    # Upload ceiling — audio answer clips are capped at 10MB in the app; give a
    # little headroom for multipart overhead. Keep small to blunt abuse.
    client_max_body_size 12m;

    # Timeouts — AI routes can take a while; allow up to ~2min upstream.
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / HMR upgrade support (harmless in prod).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward the canonical name, not the client-supplied Host, so a spoofed
        # Host header can't reach Next.js (poisoned absolute URLs, cache keys).
        proxy_set_header Host              $server_name;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
