# gitleaks config for ai-mock-interview
# Extends the built-in ruleset and allowlists known placeholder secrets so the
# gate stays green on example/docs while still catching real committed secrets.

title = "ai-mock-interview gitleaks config"

[extend]
useDefault = true

# AND: a finding is allowlisted only when it matches BOTH an approved path AND a
# placeholder pattern. regexTarget = "line" matches the placeholder against the
# whole line. Without this, listing a path would ignore *every* secret in that
# file — so a real credential committed to .env.example/README/a workflow would
# slip through.
[[allowlists]]
description = "Placeholder / example secrets that are not real credentials"
condition = "AND"
regexTarget = "line"
paths = [
  '''\.env\.example$''',
  '''README\.md$''',
  '''\.github/workflows/.*\.yml$''',
]
regexes = [
  '''your-super-secret-jwt-key''',
  '''your-jwt-secret''',
  '''gsk_your_key_here''',
  '''ci-test-secret-key-not-for-production''',
  '''postgresql://(user|fake):(password|fake)@''',
]
